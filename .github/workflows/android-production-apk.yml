name: Mobile Tag Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for the release (e.g. v1.0.1)"
        required: true
        default: "v1.0.1"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: mobile-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add swap space
        run: |
          if sudo swapon --show | grep -q /swapfile; then
            echo "Swap already active on /swapfile, skipping creation."
          else
            sudo fallocate -l 6G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi
          free -h

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        run: npm install --no-audit --no-fund

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Detect RAM and set safe Gradle memory
        shell: bash
        run: |
          TOTAL_KB=$(awk '/MemTotal/ {print $2}' /proc/meminfo)
          TOTAL_GB=$(awk -v kb="$TOTAL_KB" 'BEGIN {printf "%.2f", kb/1024/1024}')
          CPU_CORES=$(nproc)

          if [ "$TOTAL_KB" -lt 3145728 ]; then
            XMX="1024m"
            METASPACE="384m"
            KOTLIN_XMX="768m"
            WORKERS="1"
            PARALLEL_FLAG="--no-parallel"
          elif [ "$TOTAL_KB" -lt 6291456 ]; then
            XMX="1792m"
            METASPACE="512m"
            KOTLIN_XMX="1024m"
            if [ "$CPU_CORES" -le 1 ]; then
              WORKERS="1"
            else
              WORKERS="2"
            fi
            PARALLEL_FLAG="--no-parallel"
          elif [ "$TOTAL_KB" -lt 10485760 ]; then
            XMX="3072m"
            METASPACE="768m"
            KOTLIN_XMX="2048m"
            if [ "$CPU_CORES" -le 1 ]; then
              WORKERS="1"
              PARALLEL_FLAG="--no-parallel"
            elif [ "$CPU_CORES" -le 2 ]; then
              WORKERS="2"
              PARALLEL_FLAG="--no-parallel"
            else
              WORKERS="3"
              PARALLEL_FLAG="--parallel"
            fi
          else
            XMX="4096m"
            METASPACE="1024m"
            KOTLIN_XMX="2048m"
            if [ "$CPU_CORES" -le 2 ]; then
              WORKERS="2"
              PARALLEL_FLAG="--no-parallel"
            elif [ "$CPU_CORES" -le 4 ]; then
              WORKERS="$CPU_CORES"
              PARALLEL_FLAG="--parallel"
            else
              WORKERS="4"
              PARALLEL_FLAG="--parallel"
            fi
          fi

          echo "Machine RAM: ${TOTAL_GB} GB"
          free -h
          echo "CPU cores: ${CPU_CORES}"
          echo "Selected Gradle Xmx: ${XMX}"
          echo "Selected MaxMetaspaceSize: ${METASPACE}"
          echo "Selected Kotlin daemon Xmx: ${KOTLIN_XMX}"
          echo "Selected Gradle workers: ${WORKERS}"
          echo "Parallel mode flag: ${PARALLEL_FLAG}"
          echo "GRADLE_XMX=${XMX}" >> "$GITHUB_ENV"
          echo "GRADLE_METASPACE=${METASPACE}" >> "$GITHUB_ENV"
          echo "GRADLE_KOTLIN_XMX=${KOTLIN_XMX}" >> "$GITHUB_ENV"
          echo "GRADLE_WORKERS=${WORKERS}" >> "$GITHUB_ENV"
          echo "GRADLE_PARALLEL_FLAG=${PARALLEL_FLAG}" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: mobile-app/android
        env:
          NODE_ENV: production
        run: |
          chmod +x ./gradlew
          ./gradlew \
            --no-daemon \
            ${{ env.GRADLE_PARALLEL_FLAG }} \
            --max-workers=${{ env.GRADLE_WORKERS }} \
            -Dorg.gradle.jvmargs="-Xmx${{ env.GRADLE_XMX }} -XX:MaxMetaspaceSize=${{ env.GRADLE_METASPACE }}" \
            -Dkotlin.daemon.jvm.options="-Xmx${{ env.GRADLE_KOTLIN_XMX }}" \
            -PreactNativeArchitectures=armeabi-v7a,arm64-v8a \
            assembleRelease

      - name: Resolve release tag name
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.tag_name }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF_NAME}" == v* ]]; then
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=v1.0.1" >> "$GITHUB_ENV"
          fi

      - name: Prepare APK artifact
        run: |
          mkdir -p release-assets
          cp android/app/build/outputs/apk/release/app-release.apk release-assets/rephrase-${RELEASE_TAG}.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: mobile-app/release-assets/rephrase-${{ env.RELEASE_TAG }}.apk

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-android

    steps:
      - name: Resolve release tag name
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.tag_name }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF_NAME}" == v* ]]; then
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=v1.0.1" >> "$GITHUB_ENV"
          fi

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: release-assets

      - name: Create GitHub Release and upload mobile artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            release-assets/rephrase-${{ env.RELEASE_TAG }}.apk
